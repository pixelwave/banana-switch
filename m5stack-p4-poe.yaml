esp32:
  variant: esp32p4
  flash_size: 16MB
  cpu_frequency: 360MHz          # ← THIS IS THE FIX
  engineering_sample: true       # ← Silences the rev1.3 / board warning
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: true

# # Enable PSRAM ?
# psram:
#   mode: octal
#   speed: 80MHz

# PoE Ethernet
ethernet:
  type: IP101
  mdc_pin: GPIO31
  mdio_pin: GPIO52
  power_pin: GPIO51
  phy_addr: 1
  clk:
    pin: GPIO50
    mode: CLK_EXT_IN